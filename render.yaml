# ─────────────────────────────────────────────────────────────────────────────
#  Render Blueprint — Sterlin Glams platform. Developed by Dev Rapheal.
#  Web service runs on the Pro instance (4 GB / 1 CPU); PostgreSQL is on Pro-4gb
#  (automated daily backups + point-in-time recovery — the durable home for the store's records).
#  Wired together automatically. Deploy: Render Dashboard -> New -> Blueprint -> pick this repo.
# ─────────────────────────────────────────────────────────────────────────────
databases:
  - name: sterlinglams-db
    plan: pro-4gb
    databaseName: sterlinglams
    user: sterlinglams
    region: oregon

services:
  - type: web
    name: sterlinglams
    runtime: docker
    plan: pro          # Pro instance: 4 GB / 1 CPU (upgraded from free — no more spin-down/cold starts)
    region: oregon
    dockerfilePath: ./Dockerfile
    dockerContext: .
    healthCheckPath: /health   # dedicated liveness endpoint — exempt from maintenance mode so the
                               # instance stays healthy (a 503 on "/" would get the instance pulled → 502)
    autoDeploy: true          # redeploy automatically on every push to the connected branch
    envVars:
      - key: ASPNETCORE_ENVIRONMENT
        value: Production
      # Display all times in West Africa Time (Nigeria, UTC+1). The Dockerfile also bakes this in
      # (tzdata + ENV TZ); kept here so the timezone is visible/adjustable from the Render config.
      - key: TZ
        value: Africa/Lagos
      # Render's ephemeral single instance: let the app apply migrations on startup
      # (the OP-12 escape hatch). On a multi-instance host you'd run migrations as a deploy step.
      - key: Database__AutoMigrate
        value: "true"
      - key: ASPNETCORE_URLS
        value: http://0.0.0.0:8080
      - key: PORT
        value: "8080"
      - key: AllowedHosts
        value: "*"
      # The database connection, injected by Render as a postgres:// URL.
      # Program.cs converts DATABASE_URL into an Npgsql connection string.
      - key: DATABASE_URL
        fromDatabase:
          name: sterlinglams-db
          property: connectionString
      # Paystack keys — sync:false means the VALUES are set in the Render Dashboard
      # (Environment tab), never committed here. Required for the Proceed-to-Payment
      # redirect (the server creates the transaction with the secret key).
      - key: Payment__Paystack__SecretKey
        sync: false
      - key: Payment__Paystack__PublicKey
        sync: false
      # Cloudinary (persistent image hosting). Values set in the Render Dashboard.
      # Without these the app falls back to local disk, which is wiped on every redeploy.
      - key: Cloudinary__CloudName
        sync: false
      - key: Cloudinary__ApiKey
        sync: false
      - key: Cloudinary__ApiSecret
        sync: false
      # Sentry error monitoring. Optional: the app stays inert until this DSN is set (Program.cs
      # gates on Sentry:Dsn). Set the VALUE in the Render Dashboard (Environment tab); it's the
      # DSN from your Sentry project — not a secret that must be hidden, but kept out of the repo.
      - key: Sentry__Dsn
        sync: false
